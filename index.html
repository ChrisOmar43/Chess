<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recorrido del Caballo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <h1>♞ Recorrido del Caballo</h1>
    <p id="status">Haz clic en una casilla para colocar el caballo</p>

    <div id="controls">
      <span id="move-counter">Movimientos: 0 / 64</span>
      <button id="btn-restart">Reiniciar</button>
      <button id="btn-hints" title="Mostrar/ocultar casillas posibles">Ayuda: ON</button>
      <button id="btn-suggest" title="Sugerir mejor movimiento (Warnsdorff)" disabled>Pista</button>
    </div>

    <div id="board"></div>

    <div id="record">Mejor racha: <span id="best">0</span></div>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <p id="modal-msg"></p>
      <button id="modal-close">OK</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
